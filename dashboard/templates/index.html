<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRT Trading Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }
        .header h1 { font-size: 1.5rem; color: #58a6ff; }
        .header .status { font-size: 0.85rem; color: #8b949e; }
        .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot.green { background: #3fb950; }
        .dot.red { background: #f85149; }
        .dot.yellow { background: #d29922; }
        .metrics-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .metric-card {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 14px 16px; text-align: center;
        }
        .metric-card .label { font-size: 0.7rem; text-transform: uppercase; color: #8b949e; letter-spacing: 0.5px; }
        .metric-card .value { font-size: 1.3rem; font-weight: 600; margin-top: 4px; }
        .value.green { color: #3fb950; }
        .value.red { color: #f85149; }
        .value.blue { color: #58a6ff; }
        .value.white { color: #c9d1d9; }
        .chart-container {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 16px; margin-bottom: 20px;
        }
        .chart-container h3 { font-size: 0.9rem; color: #8b949e; margin-bottom: 10px; }
        .chart-container canvas { width: 100% !important; height: 300px !important; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
        table {
            width: 100%; border-collapse: collapse; font-size: 0.8rem;
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
        }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-weight: 500; text-transform: uppercase; font-size: 0.7rem; }
        td { font-family: monospace; }
        .section-title { font-size: 0.9rem; color: #8b949e; margin-bottom: 10px; margin-top: 5px; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600;
        }
        .badge.long { background: #0d5320; color: #7ee787; }
        .badge.short { background: #8b1a1a; color: #ffa198; }
        .badge.open { background: #1f3a5f; color: #79c0ff; }
        .empty { color: #484f58; text-align: center; padding: 30px; font-style: italic; }
        .controls {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .controls button {
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #30363d; }
        .controls button.active { background: #1f6feb; border-color: #1f6feb; }
        .toolbar { display: flex; gap: 16px; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>CRT Trading Bot</h1>
            <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Loading...</span></div>
        </div>
        <div class="toolbar">
            <span id="lastUpdate" style="color:#8b949e;font-size:0.8rem;"></span>
            <span id="clock" style="color:#8b949e;font-size:0.8rem;"></span>
        </div>
    </div>

    <div class="metrics-grid" id="metricsGrid">
        <div class="metric-card"><div class="label">Total PnL</div><div class="value white" id="met_totalPnl">--</div></div>
        <div class="metric-card"><div class="label">Win Rate</div><div class="value white" id="met_winRate">--</div></div>
        <div class="metric-card"><div class="label">Profit Factor</div><div class="value white" id="met_profitFactor">--</div></div>
        <div class="metric-card"><div class="label">Sharpe Ratio</div><div class="value white" id="met_sharpe">--</div></div>
        <div class="metric-card"><div class="label">Total Trades</div><div class="value white" id="met_trades">--</div></div>
        <div class="metric-card"><div class="label">Max DD %</div><div class="value white" id="met_maxDD">--</div></div>
        <div class="metric-card"><div class="label">Avg Win</div><div class="value white" id="met_avgWin">--</div></div>
        <div class="metric-card"><div class="label">Avg Loss</div><div class="value white" id="met_avgLoss">--</div></div>
    </div>

    <div class="two-col">
        <div class="chart-container">
            <h3>Equity Curve</h3>
            <canvas id="equityChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>Trade PnL Distribution</h3>
            <canvas id="pnlChart"></canvas>
        </div>
    </div>

    <div class="section-title">Open Positions</div>
    <div id="positionsContainer"><p class="empty">No open positions</p></div>

    <div class="section-title" style="margin-top:16px;">Trade History</div>
    <div class="controls">
        <button class="active" data-filter="all" onclick="filterTrades('all')">All</button>
        <button data-filter="long" onclick="filterTrades('long')">Long</button>
        <button data-filter="short" onclick="filterTrades('short')">Short</button>
        <button data-filter="TP2" onclick="filterTrades('TP2')">Wins</button>
        <button data-filter="SL" onclick="filterTrades('SL')">Losses</button>
    </div>
    <div style="overflow-x:auto;" id="tradesContainer"><p class="empty">No trades yet</p></div>

    <script>
        let equityChart = null;
        let pnlChart = null;
        let allTrades = [];
        let currentFilter = 'all';

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchData() {
            try {
                const [statusRes] = await Promise.all([
                    fetch('/api/status'),
                ]);
                const data = await statusRes.json();
                updateDashboard(data);
            } catch(e) {
                document.getElementById('statusText').textContent = 'Connection error';
                document.getElementById('statusDot').className = 'dot red';
            }
        }

        function updateDashboard(data) {
                const sd = document.getElementById('statusDot');
            const st = document.getElementById('statusText');
            if (data.error) {
                sd.className = 'dot yellow';
                st.textContent = 'Paper trader not started';
            } else {
                sd.className = 'dot green';
                st.textContent = 'Running';
            }

            const trades = data.trades || [];
            allTrades = data.trades || [];
            const metrics = data.metrics || {};
            const equityCurve = data.equity_curve || [];

            setMetric('met_totalPnl', formatPnl(metrics.total_pnl), metrics.total_pnl > 0 ? 'green' : metrics.total_pnl < 0 ? 'red' : 'white');
            setMetric('met_winRate', (metrics.win_rate || 0) + '%', 'blue');
            setMetric('met_profitFactor', (metrics.profit_factor || 0).toFixed(2), metrics.profit_factor >= 1.5 ? 'green' : metrics.profit_factor >= 1 ? 'white' : 'red');
            setMetric('met_sharpe', (metrics.sharpe || 0).toFixed(2), metrics.sharpe >= 2 ? 'green' : metrics.sharpe >= 1 ? 'white' : 'red');
            setMetric('met_trades', metrics.total_trades || 0, 'white');
            setMetric('met_maxDD', (metrics.max_drawdown_pct || 0).toFixed(1) + '%', 'red');
            setMetric('met_avgWin', formatPnl(metrics.avg_win), 'green');
            setMetric('met_avgLoss', formatPnl(metrics.avg_loss), 'red');

            updateEquityChart(equityCurve);
            updatePnLChart(trades);
            renderTrades(trades);
            updateOpenPositions(data);

            document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }

        function setMetric(id, text, colorClass) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'value ' + (colorClass || 'white');
        }

        function formatPnl(val) {
            if (val === undefined || val === null) return '--';
            const s = val >= 0 ? '+' : '';
            return s + '$' + val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function formatTime(ts) {
            if (!ts || ts === '') return '--';
            try {
                const d = new Date(ts);
                return d.toLocaleString();
            } catch(e) { return ts; }
        }

        function updateEquityChart(curve) {
            if (!curve || curve.length < 2) {
                curve = [10000, 10000];
            }
            const labels = curve.map((_, i) => '#' + i);
            const ctx = document.getElementById('equityChart').getContext('2d');
            if (equityChart) { equityChart.destroy(); }
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Equity',
                        data: curve,
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: '#21262d' },
                            ticks: { color: '#8b949e', callback: v => '$' + v.toLocaleString() }
                        }
                    }
                }
            });
        }

        function updatePnLChart(trades) {
            if (!trades || trades.length === 0) {
                document.getElementById('pnlChart').parentElement.innerHTML = '<h3>Trade PnL Distribution</h3><p class="empty">No trades yet</p>';
                return;
            }
            const pnls = trades.map(t => parseFloat(t.pnl) || 0).filter(v => v !== 0);
            if (pnls.length === 0) return;
            const min = Math.min(...pnls);
            const max = Math.max(...pnls);
            const bins = 20;
            const binSize = (max - min) / bins || 1;
            const hist = new Array(bins).fill(0);
            const labels = [];
            for (let i = 0; i < bins; i++) {
                labels.push((min + i * binSize).toFixed(0));
            }
            pnls.forEach(v => {
                const idx = Math.min(Math.floor((v - min) / binSize), bins - 1);
                hist[idx]++;
            });
            const ctx = document.getElementById('pnlChart').getContext('2d');
            if (pnlChart) { pnlChart.destroy(); }
            const colors = hist.map((_, i) => {
                const val = min + i * binSize;
                return val >= 0 ? '#3fb950' : '#f85149';
            });
            pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Count',
                        data: hist,
                        backgroundColor: colors,
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: '#21262d' },
                            ticks: { color: '#8b949e', stepSize: 1 }
                        }
                    }
                }
            });
        }

        function updateOpenPositions(data) {
            const container = document.getElementById('positionsContainer');
            const positions = data.positions || [];
            if (positions.length === 0) {
                container.innerHTML = '<p class="empty">No open positions</p>';
                return;
            }
            let html = '<table><thead><tr><th>Symbol</th><th>Dir</th><th>Phase</th><th>Entry</th><th>Size</th><th>SL</th><th>Signal Time</th><th>Entry Time</th></tr></thead><tbody>';
            positions.forEach(p => {
                if (p.status !== 'open') return;
                html += `<tr>
                    <td>${p.symbol || '--'}</td>
                    <td><span class="badge ${p.direction}">${(p.direction || '').toUpperCase()}</span></td>
                    <td>${p.phase || '--'}</td>
                    <td>$${(p.entry_price || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                    <td>${(p.position_size || 0).toFixed(4)}</td>
                    <td>$${(p.stop_loss || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                    <td>${formatTime(p.signal_time)}</td>
                    <td>${formatTime(p.entry_time)}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderTrades(trades) {
            const container = document.getElementById('tradesContainer');
            if (!trades || trades.length === 0) {
                container.innerHTML = '<p class="empty">No trades yet</p>';
                return;
            }
            const filtered = trades.filter(t => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'long') return t.direction === 'long';
                if (currentFilter === 'short') return t.direction === 'short';
                if (currentFilter === 'TP2') return parseFloat(t.pnl) > 0;
                if (currentFilter === 'SL') return parseFloat(t.pnl) < 0;
                return true;
            });
            let html = '<table><thead><tr><th>Signal Time</th><th>Fill Time</th><th>Dir</th><th>Phase</th><th>Entry</th><th>Exit</th><th>PnL</th><th>Exit Reason</th></tr></thead><tbody>';
            filtered.forEach(t => {
                const pnl = parseFloat(t.pnl) || 0;
                html += `<tr>
                    <td>${formatTime(t.signal_time)}</td>
                    <td>${formatTime(t.entry_time)}</td>
                    <td><span class="badge ${t.direction}">${(t.direction || '').toUpperCase()}</span></td>
                    <td>${t.phase || t.exit_reason || '--'}</td>
                    <td>$${(parseFloat(t.entry_price) || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                    <td>$${(parseFloat(t.exit_price) || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                    <td style="color:${pnl >= 0 ? '#3fb950' : '#f85149'}">${formatPnl(pnl)}</td>
                    <td>${t.exit_reason || '--'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function filterTrades(filter) {
            currentFilter = filter;
            document.querySelectorAll('.controls button').forEach(b => {
                b.className = b.dataset.filter === filter ? 'active' : '';
            });
            renderTrades(allTrades);
        }

        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
